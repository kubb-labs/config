name: Setup
description: Action that sets up Node, pnpm, and caching with support for Node 22/24

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
    # We leave 'default' empty or omit it so the calling workflow
    # is forced to provide the version it actually needs.
  cache:
    description: 'Cache/build tool to use: "turbo" (default) or "moon"'
    required: false
    default: 'turbo'

runs:
  using: composite
  steps:
    # Monitors outbound network calls and detects OIDC token exfiltration attempts.
    # Supported on GitHub-hosted Linux runners only.
    - name: Harden runner
      if: runner.os == 'Linux'
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Install bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - name: Setup Node.js environment
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        # This built-in cache handles the store path logic automatically
        cache: 'pnpm'

    - name: Provide shared canary script
      shell: bash
      run: |
        mkdir -p "$GITHUB_WORKSPACE/.github"
        cp "$GITHUB_ACTION_PATH/../canary.sh" "$GITHUB_WORKSPACE/.github/canary.sh"
        chmod +x "$GITHUB_WORKSPACE/.github/canary.sh"

    - name: Setup Git User
      shell: bash
      run: |
        git config --global user.email "stijn@stijnvanhulle.be"
        git config --global user.name "Stijn Van Hulle"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
      
    - name: Setup Turbo cache
      if: ${{ inputs.cache == 'turbo' }}
      uses: rharkor/caching-for-turbo@cda201ff2b32699a2ae9f59704db029e3dde4fbd # v2.3.5
      continue-on-error: true
      with:
        cache-prefix: kubb_

    - name: Setup moon toolchain
      if: ${{ inputs.cache == 'moon' }}
      uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0
      with:
        auto-install: true
