name: Setup
description: Action that sets up Node, pnpm, and caching with support for Node 22/24

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
    # We leave 'default' empty or omit it so the calling workflow 
    # is forced to provide the version it actually needs.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Install bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        # This built-in cache handles the store path logic automatically
        cache: 'pnpm'

    - name: Setup Git User
      shell: bash
      run: |
        git config --global user.email "stijn@stijnvanhulle.be"
        git config --global user.name "Stijn Van Hulle"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Setup Turbo cache
      uses: rharkor/caching-for-turbo@v2.3.5
      continue-on-error: true
      with:
        cache-prefix: kubb_
