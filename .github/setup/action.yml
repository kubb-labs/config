name: Setup
description: Action that sets up Node, pnpm, and caching with support for Node 22/24

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
    # We leave 'default' empty or omit it so the calling workflow
    # is forced to provide the version it actually needs.
  cache:
    description: 'Cache/build tool to use: "turbo" (default) or "moon"'
    required: false
    default: 'turbo'
  force-install:
    description: 'Re-fetch dependencies with `pnpm install --frozen-lockfile --force` instead of `--prefer-offline`. Defense-in-depth for release jobs so the build does not implicitly trust a pnpm store restored from cache. Lets callers drop a second install step.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # Monitors outbound network calls and detects OIDC token exfiltration attempts.
    # Supported on GitHub-hosted Linux runners only.
    - name: Harden runner
      if: runner.os == 'Linux'
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - name: Setup pnpm
      uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

    - name: Install bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Setup Node.js environment
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        # This built-in cache handles the store path logic automatically
        cache: 'pnpm'

    - name: Setup Git User
      shell: bash
      run: |
        git config --global user.email "stijn@stijnvanhulle.be"
        git config --global user.name "Stijn Van Hulle"

    - name: Install dependencies
      shell: bash
      # `force-install: 'true'` re-fetches with --force (release hardening);
      # otherwise install with --prefer-offline. Read from env to keep the
      # input out of the shell command.
      env:
        FORCE_INSTALL: ${{ inputs.force-install }}
      run: |
        if [ "$FORCE_INSTALL" = 'true' ]; then
          pnpm install --frozen-lockfile --force
        else
          pnpm install --frozen-lockfile --prefer-offline
        fi
      
    - name: Setup Turbo cache
      if: ${{ inputs.cache == 'turbo' }}
      uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0
      continue-on-error: true
      with:
        cache-prefix: kubb_

    - name: Setup moon toolchain
      if: ${{ inputs.cache == 'moon' }}
      uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
      with:
        auto-install: true
