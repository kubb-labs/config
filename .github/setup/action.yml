name: Setup
description: Action that sets up Node, pnpm, and caching with support for Node 22/24

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
    # We leave 'default' empty or omit it so the calling workflow
    # is forced to provide the version it actually needs.
  cache:
    description: 'Cache/build tool to use: "turbo" (default) or "moon"'
    required: false
    default: 'turbo'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Install bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        # This built-in cache handles the store path logic automatically
        cache: 'pnpm'

    - name: Setup Git User
      shell: bash
      run: |
        git config --global user.email "stijn@stijnvanhulle.be"
        git config --global user.name "Stijn Van Hulle"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Install RTK (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/rtk" --version

    - name: Install RTK (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $Version = (Invoke-RestMethod "https://api.github.com/repos/rtk-ai/rtk/releases/latest").tag_name
        $Url = "https://github.com/rtk-ai/rtk/releases/download/$Version/rtk-x86_64-pc-windows-msvc.zip"
        $InstallDir = "$env:USERPROFILE\.local\bin"
        New-Item -ItemType Directory -Force -Path $InstallDir | Out-Null
        Invoke-WebRequest -Uri $Url -OutFile "$env:TEMP\rtk.zip"
        Expand-Archive -Path "$env:TEMP\rtk.zip" -DestinationPath $InstallDir -Force
        Add-Content -Path $env:GITHUB_PATH -Value $InstallDir
        & "$InstallDir\rtk.exe" --version

    - name: Setup Turbo cache
      if: ${{ !inputs.cache || inputs.cache == 'turbo' }}
      uses: rharkor/caching-for-turbo@v2.3.5
      continue-on-error: true
      with:
        cache-prefix: kubb_

    - name: Setup moon toolchain
      if: ${{ inputs.cache == 'moon' }}
      uses: moonrepo/setup-toolchain@v0
      with:
        auto-install: true
