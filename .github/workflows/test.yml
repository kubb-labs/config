name: Test

on:
  pull_request:
    paths:
      - '.github/actions/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vitest.config.ts'
      - '.github/workflows/test.yml'

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22.22.3'

      - name: Test
        run: pnpm test
